<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de contacto</title>
    <link rel="stylesheet" href="./css/formulario.css">
</head>
<body>
    <form action="https://formsubmit.co/angelomart1302@gmail.com" method="POST">
        <h2>¡Contacta con Nosotros!</h2>
        <div class="input-group">
            <label for="Name">Nombre</label>
            <input type="text" name="name" id="name" placeholder="Nombre">
            <label for="phone">Telefono</label>
            <input type="tel" name="phone" id="phone" placeholder="Telefono">
            <label for="email">Email</label>
            <input type="text" name="email" id="email" placeholder="Email">
            <label for="message">¿En que te podemos ayudar?</label>
            <textarea name="message" id="message" cols="30" rows="5" placeholder="Mensaje"></textarea>
        <div class = "form-txt">
            <a href="politica.html">Politicas y Privacidad</a>
            <a href="terminos.html">Terminos y Condiciones</a>
        </div>
        <input class="btn" type="submit" value="Enviar">
        </div>
    </form>
    
</body>
</html>
