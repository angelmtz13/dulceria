<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Dulce Web</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/formulario.css">
</head>
<body>
    <div class="contacto-container">
        <a href="./index.html" class="btn-volver">
            <i class="bi bi-arrow-left"></i> Volver al Catálogo
        </a>
        <form action="https://formsubmit.co/angelomart1302@gmail.com" method="POST">
            <h2>¡Contacta con Nosotros!</h2>
            <p class="subtitle">Escríbenos y responderemos lo antes posible</p>
            <div class="input-group">
                <label for="name">Nombre</label>
                <input type="text" name="name" id="name" placeholder="Tu nombre completo" required>
                
                <label for="phone">Teléfono</label>
                <input type="tel" name="phone" id="phone" placeholder="Tu número de teléfono" required>
                
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Tu correo electrónico" required>
                
                <label for="message">¿En qué te podemos ayudar?</label>
                <textarea name="message" id="message" cols="30" rows="5" placeholder="Cuéntanos..." required></textarea>
                
                <input class="btn" type="submit" value="Enviar Mensaje">
            </div>
        </form>
    </div>
</body>
</html>
